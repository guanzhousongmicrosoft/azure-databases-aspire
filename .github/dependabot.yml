version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      aspire:
        patterns:
          - "Aspire.*"
      dotnet:
        patterns:
          - "Microsoft.Extensions.*"
          - "OpenTelemetry.*"
      mongo:
        patterns:
          - "MongoDB.*"
          - "AspNetCore.HealthChecks.MongoDb"
      test:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "Microsoft.DotNet.RemoteExecutor"
          - "JsonSchema.Net"
      build:
        patterns:
          - "MinVer"

  - package-ecosystem: "dotnet-sdk"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore"
      include: "scope"
