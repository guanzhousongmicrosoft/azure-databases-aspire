name: Sync agentic workflows

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/*.md"
      - ".github/workflows/**/*.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gh-aw CLI
        uses: github/gh-aw/actions/setup-cli@v0.37.18
        with:
          version: v0.37.18

      - name: Compile agentic workflows
        run: gh aw compile --validate --strict

      - name: Commit generated lock files
        run: |
          if git diff --quiet; then
            echo "No generated workflow updates."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .github .gitattributes
          git commit -m "chore: compile agentic workflows"
          git push
