name: Sync agentic workflows

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/*.md"
      - ".github/workflows/**/*.md"
  workflow_dispatch:

permissions:
  contents: write
  workflows: write

jobs:
  compile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gh-aw CLI
        run: curl -sL https://raw.githubusercontent.com/github/gh-aw/v0.58.0/install-gh-aw.sh | bash -s v0.58.0

      - name: Compile agentic workflows
        run: $HOME/.local/share/gh/extensions/gh-aw/gh-aw compile --validate --strict

      - name: Commit generated lock files
        run: |
          if git diff --quiet; then
            echo "No generated workflow updates."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .github .gitattributes
          git commit -m "chore: compile agentic workflows"
          git push
