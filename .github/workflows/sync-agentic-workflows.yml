name: Sync agentic workflows

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/*.md"
      - ".github/workflows/**/*.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_AW_SYNC_TOKEN != '' && secrets.GH_AW_SYNC_TOKEN || github.token }}

      - name: Install gh-aw CLI
        run: curl -sL https://raw.githubusercontent.com/github/gh-aw/v0.58.0/install-gh-aw.sh | bash -s v0.58.0

      - name: Compile agentic workflows
        run: $HOME/.local/share/gh/extensions/gh-aw/gh-aw compile --validate --strict

      - name: Upload generated lock files
        uses: actions/upload-artifact@v4
        with:
          name: generated-agentic-workflows
          path: .github/workflows/*.lock.yml
          if-no-files-found: ignore

      - name: Print generated lock files when sync token is missing
        env:
          GH_AW_SYNC_TOKEN: ${{ secrets.GH_AW_SYNC_TOKEN }}
        run: |
          if [ -n "$GH_AW_SYNC_TOKEN" ]; then
            exit 0
          fi

          shopt -s nullglob
          for file in .github/workflows/*.lock.yml; do
            echo "__BEGIN_GH_AW_LOCKFILE__ $file"
            cat "$file"
            echo "__END_GH_AW_LOCKFILE__ $file"
          done

      - name: Commit generated lock files
        env:
          GH_AW_SYNC_TOKEN: ${{ secrets.GH_AW_SYNC_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No generated workflow updates."
            exit 0
          fi

          if [ -z "$GH_AW_SYNC_TOKEN" ]; then
            echo "::warning::GH_AW_SYNC_TOKEN is not configured, so generated workflow lock files were not pushed. Add a token with contents:write and workflows:write to enable automatic sync."
            git status --short
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A .github .gitattributes
          git commit -m "chore: compile agentic workflows"
          git push
