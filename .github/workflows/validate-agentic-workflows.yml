name: Validate agentic workflows

on:
  pull_request:
    paths:
      - ".github/workflows/*.md"
      - ".github/workflows/**/*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install gh-aw CLI
        run: curl -sL https://raw.githubusercontent.com/github/gh-aw/v0.58.0/install-gh-aw.sh | bash -s v0.58.0

      - name: Validate agentic workflows
        run: $HOME/.local/share/gh/extensions/gh-aw/gh-aw validate --strict
