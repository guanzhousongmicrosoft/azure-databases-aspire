name: Validate agentic workflows

on:
  pull_request:
    paths:
      - ".github/workflows/*.md"
      - ".github/workflows/**/*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install gh-aw CLI
        uses: github/gh-aw/actions/setup-cli@v0.37.18
        with:
          version: v0.37.18

      - name: Validate agentic workflows
        run: gh aw validate --strict
